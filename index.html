                            <div class="wind-line"></div>
                            <div class="wind-line"></div>
                        </div>
                    </div>

                    <!-- Sleeping Cat Animation -->
                    <div class="cat-container" id="cat-container" title="쓰다듬어 주세요!">

                            <text x="82" y="22" class="cat-z2">Z</text>

                            <g class="cat-body">

                                <polygon points="62,25 65,12 73,23" fill="#f97316" />

                            </g>

                    <!-- Room Environment & Electricity stats -->
                    <div class="status-grid">
                        <div class="status-card">
                            <span class="status-label" data-localize="room_temp">실내 온도</span>
                            <div class="status-value">

                        <div class="status-card">
                            <span class="status-label" data-localize="outdoor_temp">실외 온도</span>
                            <div class="status-value">
                                <span id="outdoor-temp-val">31.5</span><span class="status-unit">°C</span>
                            </div>
                        </div>
                        
                        <div class="status-card">
                            <span class="status-label" data-localize="electricity_cost">누적 전기세</span>
                            <div class="status-value">
                                <span id="cost-val">0</span><span class="status-unit" id="currency-unit">원</span>
                            </div>

                                        <span id="screen-mode-text" style="font-weight: bold;">COOL</span>
                                        <span id="screen-mode-icon">❄️</span>
                                    </div>
                                </div>

                                </button>

                                <button class="btn-remote" id="btn-mode">
                                    <span class="btn-icon-label">🎛️</span>
